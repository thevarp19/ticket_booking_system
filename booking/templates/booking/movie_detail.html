<!-- movie_detail.html -->
{% extends 'base.html' %}
{% block content %}
    <h1>{{ movie.title }}</h1>
    <p>{{ movie.description }}</p>
    <img src="{{ movie.image.url }}" alt="{{ movie.title }}">
    <h2>Theaters</h2>
    <ul>
        {% for theater in theaters %}
            <li><a href="{% url 'theater_detail' theater.id %}">{{ theater.name }}</a></li>
        {% empty %}
            <li>No theaters found.</li>
        {% endfor %}
    </ul>

    {% endblock %}
