<!-- concert_detail.html -->
<!DOCTYPE html>
<html lang="">
<head>
    <title>Concert Detail</title>
    <!-- Include Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <!-- Add your custom CSS styles if needed -->
    <style>
        /* Add your custom styles here */
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Concert Details</h1>
        <div class="card">
            <div class="card-body">
                <h2 class="card-title">{{ concert.artist }}</h2>
                <p class="card-text"><strong>Venue:</strong> {{ concert.venue }}</p>
                <p class="card-text"><strong>Date:</strong> {{ concert.date }}</p>
                <p class="card-text"><strong>Start Time:</strong> {{ concert.start }}</p>
                <p class="card-text"><strong>Artists:</strong> {{ concert.artists }}</p>
                <p class="card-text"><strong>Age Limit:</strong> {{ concert.age_limit }}</p>
                <p class="card-text"><strong>Description:</strong> {{ concert.description }}</p>
                <!-- Add your ticket booking form here -->
                <!-- You can use Django forms or plain HTML forms -->
            </div>
        </div>
    </div>
    <!-- Include Bootstrap JS -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
    <!-- Add your custom JavaScript code if needed -->
</body>
</html>
